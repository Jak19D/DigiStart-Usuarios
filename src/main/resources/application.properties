spring.application.name=DigiStart
server.port=8081

spring.datasource.shard1.jdbc-url=jdbc:postgresql://localhost:5432/digistart_shard1
spring.datasource.shard1.username=postgres
spring.datasource.shard1.password=123
spring.datasource.shard1.driver-class-name=org.postgresql.Driver

spring.datasource.shard2.jdbc-url=jdbc:postgresql://localhost:5432/digistart_shard2
spring.datasource.shard2.username=postgres
spring.datasource.shard2.password=123
spring.datasource.shard2.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/shard1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4

spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

jwt.secret=mySecretKeyForDigiStartApplication123456789
jwt.expiration=86400000

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
