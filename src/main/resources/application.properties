spring.application.name=DigiStart

# Shard 1 - IDs Pares
spring.datasource.shard1.url=jdbc:postgresql://localhost:5432/digistart_shard1
spring.datasource.shard1.username=postgres
spring.datasource.shard1.password=123
spring.datasource.shard1.driver-class-name=org.postgresql.Driver

# Shard 2 - IDs Ímpares
spring.datasource.shard2.url=jdbc:postgresql://localhost:5432/digistart_shard2
spring.datasource.shard2.username=postgres
spring.datasource.shard2.password=123
spring.datasource.shard2.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Flyway para Shard 1
spring.flyway.shard1.enabled=true
spring.flyway.shard1.locations=classpath:db/migration/shard1
spring.flyway.shard1.baseline-on-migrate=true

# Flyway para Shard 2
spring.flyway.shard2.enabled=true
spring.flyway.shard2.locations=classpath:db/migration/shard2
spring.flyway.shard2.baseline-on-migrate=true

spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

spring.security.user.name=admin
spring.security.user.password=admin

server.port=8081
